{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="width: 400px; padding: 50px; text-align: center;">
    <h2 style="margin-bottom: 10px;">Welcome Back</h2>
    <p style="color: #888; margin-bottom: 30px; font-size: 14px;">Sign in to analyze your resume</p>

    <form method="POST">
        <input type="email" name="email" placeholder="Email Address" required
        style="width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box;">

        <input type="password" name="password" placeholder="Password" required
        style="width: 100%; padding: 14px; margin-bottom: 25px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box;">

        <button type="submit" class="btn-primary" style="width: 100%;">Access Dashboard</button>
    </form>
    
    <p style="margin-top: 25px; font-size: 14px; color: #888;">
        Don't have an account? <a href="/register" style="color: var(--primary); text-decoration: none;">Create one</a>
    </p>
</div>
{% endblock %}
