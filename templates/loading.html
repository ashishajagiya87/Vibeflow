<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vibe Flow | AI Processing</title>
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #92fe9d;
            --bg: #050b18;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(0, 210, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(146, 254, 157, 0.05) 0%, transparent 40%);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        /* --- THE FUTURISTIC SCANNER --- */
        .scanner-box {
            position: relative;
            width: 200px;
            height: 280px;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin: 0 auto 40px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.1);
        }

        /* Moving Scan Line */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to right, transparent, var(--primary), transparent);
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            animation: scanMove 2.5s ease-in-out infinite;
        }

        /* Pulsing Document Icon */
        .doc-icon {
            font-size: 80px;
            margin-top: 80px;
            opacity: 0.2;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes scanMove {
            0% { top: 0%; }
            50% { top: 98%; }
            100% { top: 0%; }
        }

        @keyframes pulse {
            from { opacity: 0.1; transform: scale(0.95); }
            to { opacity: 0.3; transform: scale(1.05); }
        }

        /* --- TEXT STYLING --- */
        h1 {
            font-size: 32px;
            letter-spacing: 2px;
            margin-bottom: 5px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-text {
            color: #888;
            font-size: 16px;
            margin-bottom: 40px;
        }

        /* --- PROGRESS STEPS --- */
        .steps-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 300px;
            margin: 0 auto;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
            opacity: 0.3;
            transition: 0.5s;
        }

        /* Active animation for steps */
        .active-step {
            opacity: 1;
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px rgba(0, 210, 255, 0.1); }
            to { box-shadow: 0 0 15px rgba(0, 210, 255, 0.3); }
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="scanner-box">
            <div class="scan-line"></div>
            <div class="doc-icon">📄</div>
        </div>

        <h1>SYSTEM ANALYZING</h1>
        <p class="status-text">Deploying Neural Network for Resume Evaluation...</p>

        <div class="steps-container">
            <div class="step-item active-step" id="step1">
                <div class="dot"></div> 🔍 Extracting PDF Metadata
            </div>
            <div class="step-item" id="step2">
                <div class="dot"></div> 📊 Identifying Technical Skills
            </div>
            <div class="step-item" id="step3">
                <div class="dot"></div> 🤖 Querying AI Model (Ollama)
            </div>
            <div class="step-item" id="step4">
                <div class="dot"></div> ✅ Finalizing ATS Score
            </div>
        </div>
    </div>

    <script>
        // Script to simulate progress so the user sees something changing
        const steps = ["step1", "step2", "step3", "step4"];
        let currentStep = 0;

        const interval = setInterval(() => {
            if (currentStep < steps.length - 1) {
                document.getElementById(steps[currentStep]).classList.remove('active-step');
                currentStep++;
                document.getElementById(steps[currentStep]).classList.add('active-step');
            } else {
                clearInterval(interval);
            }
        }, 3000); 
    </script>

</body>
</html>
