{% extends "base.html" %}
{% block content %}
<div class="glass-card" style="width: 100%; max-width: 400px; padding: 50px; text-align: center; box-sizing: border-box;">
    <h2 style="margin-bottom: 10px;">Create Account</h2>
    <p style="color: #888; margin-bottom: 30px; font-size: 14px;">Join Vibe Flow and get hired faster</p>

    <form method="POST">
        <input type="email" name="email" placeholder="Email Address" required
        style="width: 100%; padding: 14px; margin-bottom: 15px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box;">

        <input type="password" name="password" placeholder="Create Password" required
        style="width: 100%; padding: 14px; margin-bottom: 25px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 10px; color: white; box-sizing: border-box;">

        <button type="submit" class="btn-primary" style="width: 100%;">Register Now</button>
    </form>
    
    <p style="margin-top: 25px; font-size: 14px; color: #888;">
        Already registered? <a href="/login" style="color: var(--primary); text-decoration: none;">Login here</a>
    </p>
</div>
{% endblock %}
